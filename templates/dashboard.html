{% extends "base.html" %}

{% block title %}Dashboard — Spendly{% endblock %}

{% block content %}

<section class="dashboard-section">
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1 class="dashboard-title">Welcome back, {{ session.user_name }}!</h1>
            <a href="{{ url_for('add_expense') }}" class="btn-primary">+ Add expense</a>
        </div>
        <div class="dashboard-empty">
            <p>Your expenses will appear here. Start by adding one above.</p>
        </div>
    </div>
</section>

{% endblock %}
